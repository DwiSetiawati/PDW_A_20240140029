<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PDW</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --accent: #c8f03d;
      --accent2: #ff6b35;
      --text: #f0ede6;
      --muted: #888;
      --border: #2a2a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,240,61,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,240,61,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,61,0.08) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 40px;
      font-family: 'Space Mono', monospace;
    }

    .card-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
    }

    .card-form::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-control {
      background: #1e1e1e;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      background: #1e1e1e;
      color: var(--text);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,240,61,0.12);
      outline: none;
    }

    .form-control.is-invalid {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
    }

    .form-control::placeholder { color: #444; }

    .invalid-feedback {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent2);
      margin-top: 6px;
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200,240,61,0.3);
    }

    .btn-login:active { transform: translateY(0); }

    .mb-field { margin-bottom: 24px; }

    .corner-num {
      position: absolute;
      bottom: 20px;
      right: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 80px;
      font-weight: 700;
      color: rgba(200,240,61,0.04);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-wrapper { animation: fadeUp 0.6s ease both; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="tag">// PDW Assignment</div>
    <h1>Selamat<br/><span>Datang.</span></h1>
    <p class="subtitle">Masukkan data dirimu untuk melanjutkan →</p>

    <div class="card-form">
      <div class="corner-num">01</div>

      <div class="mb-field">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="contoh: budi_santoso" autocomplete="off"/>
        <div class="invalid-feedback" id="err-username"></div>
      </div>

      <div class="mb-field">
        <label class="form-label">NIM</label>
        <input type="text" id="nim" class="form-control" placeholder="contoh: 123456789" autocomplete="off" maxlength="12"/>
        <div class="invalid-feedback" id="err-nim"></div>
      </div>

      <div class="mb-field">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="contoh: budi@email.com" autocomplete="off"/>
        <div class="invalid-feedback" id="err-email"></div>
      </div>

      <button class="btn-login" onclick="handleLogin()">Masuk →</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function setError(id, errId, msg) {
      const el = document.getElementById(id);
      const err = document.getElementById(errId);
      if (msg) {
        el.classList.add('is-invalid');
        err.textContent = msg;
        err.style.display = 'block';
        return false;
      } else {
        el.classList.remove('is-invalid');
        err.style.display = 'none';
        return true;
      }
    }

    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const nim = document.getElementById('nim').value.trim();
      const email = document.getElementById('email').value.trim();

      let valid = true;

      if (!username) {
        valid &= setError('username', 'err-username', '⚠ Username tidak boleh kosong');
      } else if (username.length < 3) {
        valid &= setError('username', 'err-username', '⚠ Username minimal 3 karakter');
      } else {
        setError('username', 'err-username', '');
      }

      if (!nim) {
        valid &= setError('nim', 'err-nim', '⚠ NIM tidak boleh kosong');
      } else if (!/^\d{6,12}$/.test(nim)) {
        valid &= setError('nim', 'err-nim', '⚠ NIM harus angka, 6–12 digit');
      } else {
        setError('nim', 'err-nim', '');
      }

      if (!email) {
        valid &= setError('email', 'err-email', '⚠ Email tidak boleh kosong');
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        valid &= setError('email', 'err-email', '⚠ Format email tidak valid');
      } else {
        setError('email', 'err-email', '');
      }

      if (valid) {
        sessionStorage.setItem('user', JSON.stringify({ username, nim, email }));
        window.location.href = 'homepage.html';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
